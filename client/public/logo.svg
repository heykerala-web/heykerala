<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0F766E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#14B8A6;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="10"/>
      <feOffset dx="5" dy="5" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <rect width="512" height="512" rx="120" fill="url(#skyGrad)"/>
  
  <!-- Backwaters Reflection -->
  <path d="M50 400C50 400 150 420 256 420C362 420 462 400 462 400V480C462 480 362 500 256 500C150 500 50 480 50 480V400Z" fill="white" fill-opacity="0.1"/>

  <!-- Coconut Palm Tree (Left side) -->
  <g filter="url(#shadow)">
    <path d="M140 400C140 400 130 300 180 220" stroke="#4B2C20" stroke-width="12" stroke-linecap="round"/>
    <path d="M180 220C180 220 140 210 110 230" stroke="#059669" stroke-width="8" stroke-linecap="round"/>
    <path d="M180 220C180 220 160 180 130 170" stroke="#059669" stroke-width="8" stroke-linecap="round"/>
    <path d="M180 220C180 220 190 170 210 160" stroke="#059669" stroke-width="8" stroke-linecap="round"/>
    <path d="M180 220C180 220 220 190 230 220" stroke="#059669" stroke-width="8" stroke-linecap="round"/>
    <path d="M180 220C180 220 210 240 190 270" stroke="#059669" stroke-width="8" stroke-linecap="round"/>
  </g>

  <!-- Houseboat (Kettuvallam) -->
  <g filter="url(#shadow)">
    <path d="M220 380C220 380 280 400 380 400C480 400 500 370 500 370V340C500 340 480 310 380 310C280 310 220 330 220 330V380Z" fill="#D97706"/>
    <path d="M240 330V280C240 260 270 240 340 240C410 240 440 260 440 280V330" fill="#FDE047" stroke="#92400E" stroke-width="4"/>
    <path d="M280 280H400" stroke="#92400E" stroke-width="2"/>
    <path d="M300 380L340 420" stroke="white" stroke-width="4" stroke-opacity="0.5" stroke-linecap="round"/>
  </g>

  <!-- H E Y K E R A L A Text -->
  <text x="50%" y="110" text-anchor="middle" fill="white" font-family="Verdana, Geneva, sans-serif" font-weight="900" font-size="64" letter-spacing="4">HEYKERALA</text>
  
  <!-- Subtle Wave -->
  <path d="M100 450C180 470 320 430 400 450" stroke="white" stroke-width="2" stroke-opacity="0.3" stroke-linecap="round"/>
</svg>
